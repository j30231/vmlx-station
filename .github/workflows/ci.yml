name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up runtime venv
        run: |
          cd runtime
          python -m venv .venv
          source .venv/bin/activate
          pip install -e .

      - name: Python compile check
        run: python3 -m compileall runtime/src

      - name: Swift build
        run: swift build

